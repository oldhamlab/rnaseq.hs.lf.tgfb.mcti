# config.yaml
# User-configurable paths and settings for the RNA-seq pipeline.
# Adjust these to match your local environment.

# Full path to the snakemake binary in the conda environment.
# Find with: mamba activate snakemake && which snakemake
snakemake_bin: /Users/will/.local/share/mamba/envs/snakemake/bin/snakemake

# Kingfisher download methods, tried in order.
# Options: ena-ascp, ena-ftp, aws-http, prefetch
# Use "ena-ascp ena-ftp aws-http prefetch" once data is mirrored on ENA.
# Use "aws-http prefetch" for recently released data.
download_methods: "aws-http prefetch"

# Where to store downloaded FASTQ files
reads_dir: data-raw/reads

# Where to build the Salmon index (shared across experiments)
index_dir: data-raw/index

# Where to write Salmon quantification output
quants_dir: data-raw/quants

# Number of threads for Salmon and fasterq-dump
threads: 16

# GENCODE reference version
gencode_version: 47

# Sample manifest (generated by targets pipeline)
samples_tsv: data-raw/sra/samples.tsv
